# Parcel Bot — fly.kazakhindubai.com
# Telegram Mini App + API + Bot webhook

# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name fly.kazakhindubai.com;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name fly.kazakhindubai.com;

    ssl_certificate /etc/letsencrypt/live/fly.kazakhindubai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fly.kazakhindubai.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # API Backend (FastAPI)
    location /api/ {
        proxy_pass http://localhost:8091;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 20M;
    }

    # Bot Webhook
    location /webhook {
        proxy_pass http://localhost:8091/webhook;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Health check
    location /health {
        proxy_pass http://localhost:8091/health;
        proxy_set_header Host $host;
    }

    # API docs
    location /docs {
        proxy_pass http://localhost:8091/docs;
        proxy_set_header Host $host;
    }

    location /redoc {
        proxy_pass http://localhost:8091/redoc;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://localhost:8091/openapi.json;
        proxy_set_header Host $host;
    }

    # WebApp (Vue SPA)
    location / {
        proxy_pass http://localhost:8092;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
