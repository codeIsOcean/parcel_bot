version: "3.9"

services:
  # === PostgreSQL ===
  postgres:
    image: postgres:16-alpine
    container_name: parcel_bot_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: parcel_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # === Redis ===
  redis:
    image: redis:7-alpine
    container_name: parcel_bot_redis
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # === FastAPI Backend ===
  backend:
    image: ghcr.io/${GITHUB_REPO}/backend:latest
    container_name: parcel_bot_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@postgres:5432/parcel_bot
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  # === Telegram Bot ===
  bot:
    image: ghcr.io/${GITHUB_REPO}/bot:latest
    container_name: parcel_bot_tg
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@postgres:5432/parcel_bot
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  # === WebApp (Vue SPA — nginx) ===
  webapp:
    image: ghcr.io/${GITHUB_REPO}/webapp:latest
    container_name: parcel_bot_webapp
    restart: unless-stopped
    networks:
      - internal

  # === Nginx Reverse Proxy ===
  nginx:
    image: nginx:alpine
    container_name: parcel_bot_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - webapp
    networks:
      - internal

volumes:
  pgdata:
  redisdata:

networks:
  internal:
    driver: bridge
