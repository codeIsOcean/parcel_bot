version: "3.9"

services:
  # === PostgreSQL ===
  postgres:
    image: postgres:16-alpine
    container_name: parcel_bot_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: parcel_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-parcel_secret}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  # === Redis ===
  redis:
    image: redis:7-alpine
    container_name: parcel_bot_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # === FastAPI Backend ===
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: parcel_bot_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-parcel_secret}@postgres:5432/parcel_bot
      REDIS_URL: redis://redis:6379/0
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./shared:/app/shared
      - ./backend:/app/backend
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini

  # === Telegram Bot ===
  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    container_name: parcel_bot_tg
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-parcel_secret}@postgres:5432/parcel_bot
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./shared:/app/shared
      - ./bot:/app/bot
      - ./backend:/app/backend

  # === WebApp (Vite dev) ===
  webapp:
    build:
      context: ./webapp
      dockerfile: Dockerfile
    container_name: parcel_bot_webapp
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: /api/v1
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
