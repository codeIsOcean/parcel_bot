name: Build & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  REPO: ${{ github.repository }}

jobs:
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # === Backend ===
      - name: Build & Push Backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.REPO }}/backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      # === Bot ===
      - name: Build & Push Bot
        uses: docker/build-push-action@v6
        with:
          context: .
          file: bot/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.REPO }}/bot:latest
          cache-from: type=gha,scope=bot
          cache-to: type=gha,mode=max,scope=bot

      # === WebApp ===
      - name: Build & Push WebApp
        uses: docker/build-push-action@v6
        with:
          context: ./webapp
          file: webapp/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.REPO }}/webapp:latest
          build-args: |
            VITE_API_URL=/api/v1
          cache-from: type=gha,scope=webapp
          cache-to: type=gha,mode=max,scope=webapp

  deploy:
    name: Deploy to VPS
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (для docker-compose и nginx конфигов)
        uses: actions/checkout@v4

      - name: Copy configs to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.prod.yml,nginx/"
          target: ~/parcel_bot/

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/parcel_bot

            # Логинимся в GitHub Container Registry
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            # Экспортируем переменные для docker-compose
            export GITHUB_REPO="${{ github.repository }}"

            # Pull новых образов
            docker compose -f docker-compose.prod.yml pull backend bot webapp

            # Перезапуск с новыми образами (zero-downtime — по одному)
            docker compose -f docker-compose.prod.yml up -d --no-deps backend
            docker compose -f docker-compose.prod.yml up -d --no-deps bot
            docker compose -f docker-compose.prod.yml up -d --no-deps webapp
            docker compose -f docker-compose.prod.yml up -d --no-deps nginx

            # Удаляем старые образы
            docker image prune -f
